[tool.ruff]
target-version = "py314"
line-length = 98

[tool.ruff.lint]
select = [
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "PGH", # pygrep-hooks
    "RUF", # ruff-specific
    "SIM", # flake8-simplify
    "UP",  # pyupgrade
    "W",   # pycodestyle warnings
]
ignore = [
    "E501",  # line length handled by formatter
]

[tool.ruff.lint.isort]
known-first-party = ["asset_manager"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["."]

[tool.coverage.run]
source = ["custom_components.asset_manager"]
branch = true

[tool.coverage.report]
show_missing = true