name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Fetch the annotated tag object to get its message
          tag_sha=$(gh api repos/${{ github.repository }}/git/refs/tags/"$tag" --jq '.object.sha')
          tag_type=$(gh api repos/${{ github.repository }}/git/tags/"$tag_sha" --jq '.type')
          if [ "$tag_type" = "tag" ]; then
            notes=$(gh api repos/${{ github.repository }}/git/tags/"$tag_sha" --jq '.message')
          else
            notes="Release $tag"
          fi
          gh release create "$tag" \
            --title "$tag" \
            --notes "$notes" \
            --verify-tag